name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: foodjet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/foodjet_test
      TELEGRAM_BOT_TOKEN: test:fake-token
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters
      NODE_ENV: development

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        working-directory: apps/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: apps/backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: apps/backend
        run: npx prisma migrate deploy

      - name: TypeScript check
        working-directory: apps/backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: apps/backend
        run: npm test

  frontend:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [mini-app, admin, courier]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm install

      - name: TypeScript check
        working-directory: apps/${{ matrix.app }}
        run: npx tsc --noEmit

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: npm run build
